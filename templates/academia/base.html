<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            display: flex;
            min-height: 100vh;
        }

        /* MENÚ LATERAL (SIDEBAR) FIJO */
        .sidebar {
            width: 260px;
            background-color: #2c3e50;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        }

        .sidebar .marca-academia {
            font-size: 1.4em;
            font-weight: bold;
            text-align: center;
            margin-bottom: 40px;
            color: #3498db;
            border-bottom: 1px solid #34495e;
            padding-bottom: 15px;
        }

        .sidebar a, .sidebar .btn-logout {
            color: #ecf0f1;
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            transition: all 0.3s;
            width: 100%;
            text-align: left;
        }

        .sidebar a:hover, .sidebar .btn-logout:hover {
            background-color: #34495e;
            color: #3498db;
            padding-left: 20px;
        }

        .sidebar .btn-logout {
            border: none;
            background: none;
            cursor: pointer;
        }

        /* CONTENEDOR PRINCIPAL DERECHO */
        .contenido-principal {
            margin-left: 260px; /* Deja espacio para el menú lateral */
            flex-grow: 1;
            padding: 40px;
            min-height: 100vh;
        }

        /* Animación para el icono de en vivo */
        @keyframes pulse-live {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
        .animate-pulse {
            animation: pulse-live 2s infinite;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="marca-academia">
            <span>Menu</span>
        </div>
        
        <!-- Enlaces Públicos -->
        <a href="{% url 'inicio' %}"><i class="bi bi-house-door"></i> Inicio</a>
        <a href="{% url 'lista_cursos' %}"><i class="bi bi-book"></i> Ver Cursos</a>
        
        <!-- Enlaces Privados (Solo usuarios autenticados) -->
        {% if user.is_authenticated %}
            <a href="{% url 'record_estudiante' request.user.id %}">
                <i class="bi bi-person"></i> Mi Record
            </a>
            <a href="{% url 'area_pagos' %}">
                <i class="bi bi-credit-card"></i> Reportar Pago
            </a>
            
            <!-- NUEVA OPCIÓN: Clases en Vivo -->
            <a href="{% url 'clases_en_vivo' %}" style="color: #f1c40f;">
                <i class="bi bi-broadcast animate-pulse"></i> Clases en Vivo
            </a>
            
            <!-- Separador sutil antes de salir -->
            <div class="mt-4 border-top border-secondary opacity-25 mb-3"></div>

            <!-- Nombre de usuario -->
            <div class="px-3 mb-2 small text-muted text-center">
                Conectado: {{ user.username }}
            </div>

            <!-- Formulario Seguro de Cerrar Sesión -->
            <form action="{% url 'logout' %}" method="post" class="w-100">
                {% csrf_token %}
                <button type="submit" class="btn-logout">
                    <i class="bi bi-box-arrow-left"></i> Cerrar Sesión
                </button>
            </form>
        {% else %}
            <!-- Opción para iniciar sesión si es visitante -->
            <a href="{% url 'login' %}">
                <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
            </a>
        {% endif %}
    </div>

    <div class="contenido-principal">
        {% block content %}
        
        {% endblock %}
    </div>

</body>
</html>
