{% extends "academia/base.html" %}

{% block content %}

<style>
        /* Estilos base sin romper el Flexbox de Bootstrap */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            color: #333;
            min-height: 100vh;
        }

        /* Sección del Banner Principal */
        .hero {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            text-align: center;
            padding: 80px 20px;
            width: 100%;
        }

        .hero h1 {
            margin: 0;
            font-size: 2.5em;
        }

        .hero p {
            font-size: 1.2em;
            margin: 15px 0 30px 0;
        }

        /* Botón personalizado del Banner */
        .btn-hero {
            background-color: #e74c3c;
            color: white !important;
            padding: 12px 24px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: background 0.3s;
            display: inline-block;
        }

        .btn-hero:hover {
            background-color: #c0392b;
        }

        /* Contenedor de la Visión (Solo se usa en Inicio) */
        .contenido-vision {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }

        .valores-vision {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0,05);
        }
    </style>

    </style>


    <div class="hero">
        <h1>✨ Welcome to Kenegdo Academy</h1>
        <p>Un espacio dedicado al crecimiento, el aprendizaje y el desarrollo integral.</p>
        <!-- Este botón usa las etiquetas de Django para buscar la URL de los cursos automáticamente -->
    </div>

</div>



{% endblock %}
