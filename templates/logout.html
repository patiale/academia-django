{% extends 'Academia/base.html' %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="card shadow-sm border-0 text-center p-5" style="max-width: 450px; border-radius: 12px; background-color: #ffffff;">
        
        <!-- Ícono Visual -->
        <div class="mb-4">
            <div class="bg-light d-inline-flex align-items-center justify-content-center rounded-circle" style="width: 80px; height: 80px;">
                <i class="bi bi-door-open text-secondary" style="font-size: 2.5rem;"></i>
            </div>
        </div>

        <!-- Mensaje principal -->
        <h2 class="fw-bold mb-3 text-dark">¡Hasta luego!</h2>
        <p class="text-muted mb-4">
            Has cerrado sesión correctamente. Gracias por pasar tiempo en la academia el día de hoy.
        </p>

        <!-- Botón de acción -->
        <div class="d-grid">
            <a href="{% url 'login' %}" class="btn btn-primary btn-lg shadow-sm fw-medium">
                <i class="bi bi-box-arrow-in-right me-2"></i> Volver a Iniciar Sesión
            </a>
        </div>
        
        <!-- Enlace secundario -->
        <div class="mt-3">
            <a href="{% url 'inicio' %}" class="text-decoration-none text-secondary small">
                Ir al inicio público
            </a>
        </div>

    </div>
</div>
{% endblock %}
