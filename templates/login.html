<!DOCTYPE html>
<html>
<head>
    <style>
        /* Estilos generales */
        body { margin: 0; font-family: sans-serif; }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f7f6;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            gap: 40px;
            max-width: 800px;
            width: 90%;
        }
        .image-area {
            flex: 1;
            background-color: #0056b3; /* Tu color azul */
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .form-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #0056b3; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-box">
        <div class="image-area">
            <h3>Logo Kenegdo Academy</h3>
        </div>
        
        <div class="form-area">
            <h2>Login</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
